<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fun Game</title>

<style>
:root{
    --accent:#ff7a18;
    --accent2:#ff3d81;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,system-ui;
    background:radial-gradient(circle at top,#ffb347,#ff3d81);
    min-height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:380px;
    backdrop-filter: blur(14px);
    background:rgba(255,255,255,.92);
    border-radius:24px;
    padding:32px 26px;
    text-align:center;
    box-shadow:
      0 18px 40px rgba(0,0,0,.25),
      inset 0 1px 0 rgba(255,255,255,.6);
    animation:float .7s ease;
}

@keyframes float{
    from{opacity:0;transform:translateY(20px) scale(.96)}
    to{opacity:1;transform:none}
}

h2{
    margin:10px 0 22px;
    font-weight:700;
    letter-spacing:.3px;
}

button{
    width:100%;
    padding:16px;
    margin:12px 0;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.25s ease;
}

button:active{
    transform:scale(.97);
}

.primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    box-shadow:0 8px 20px rgba(255,80,120,.45);
}

.option{
    background:#f2f4ff;
    color:#1e2a78;
}

.option:hover{
    background:#e3e7ff;
}

.result{
    margin-top:16px;
    font-size:17px;
    font-weight:600;
}

.success{
    color:#1aa54b;
}

.fail{
    color:#d62828;
}
</style>
</head>

<body>

<div class="card">

<div id="step1">
    <button class="primary" onclick="showQuestion()">Click Here</button>
</div>

<div id="step2" style="display:none;">
    <h2>Who is my baccha?</h2>
    <button class="option" onclick="correct()">Budbudiyu</button>
    <button class="option" onclick="wrong()">Me</button>
    <div id="result" class="result"></div>
</div>

</div>

<script>
function showQuestion(){
    step1.style.display="none";
    step2.style.display="block";
}

function correct(){
    result.innerHTML="🎉 Correct! Budbudiyu is the baccha!";
    result.className="result success";
}

function wrong(){
    result.innerHTML="😄 Nope — try again!";
    result.className="result fail";
}
</script>

</body>
</html>
