<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fun Game</title>

<style>
body{
    font-family: system-ui, Arial;
    background:linear-gradient(135deg,#ff9a00,#ff3d81);
    min-height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    background:#fff;
    width:100%;
    max-width:360px;
    padding:28px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 10px 28px rgba(0,0,0,.25);
}

h2{
    margin-top:0;
}

button{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.main-btn{
    background:#ff7a00;
    color:white;
}

.option-btn{
    background:#4b7bff;
    color:white;
}

.correct{color:#1e9c1e;font-weight:700}
.wrong{color:#d11c1c;font-weight:700}
</style>
</head>

<body>

<div class="box">

<div id="step1">
    <button class="main-btn" onclick="showQuestion()">Click Here</button>
</div>

<div id="step2" style="display:none;">
    <h2>Who is my baccha?</h2>
    <button class="option-btn" onclick="correct()">Budbudiyu</button>
    <button class="option-btn" onclick="wrong()">Me</button>
    <p id="result"></p>
</div>

</div>

<script>
function showQuestion(){
    step1.style.display="none";
    step2.style.display="block";
}

function correct(){
    result.innerHTML="🎉 Correct! Budbudiyu is the baccha!";
}

function wrong(){
    result.innerHTML="😂 Nope! Try again.";
}
</script>

</body>
</html>
