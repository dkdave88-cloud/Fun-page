<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Offline Game</title>

<style>
body{
    font-family: system-ui, Arial;
    background:linear-gradient(135deg,#ff9a00,#ff3d81);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.box{
    background:#fff;
    padding:40px;
    border-radius:16px;
    width:320px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,.25);
    animation:pop .6s ease;
}

@keyframes pop{
    from{transform:scale(.7);opacity:0}
    to{transform:scale(1);opacity:1}
}

button{
    padding:14px 22px;
    border:none;
    border-radius:10px;
    font-size:16px;
    margin:8px;
    cursor:pointer;
    transition:.2s;
}

button:hover{transform:scale(1.07)}

.main-btn{
    background:#ff7a00;
    color:white;
}

.option-btn{
    background:#4b7bff;
    color:white;
}

.correct{color:#1ea21e;font-weight:700}
.wrong{color:#d11c1c;font-weight:700}

.fullscreen{
    position:fixed;
    top:15px;
    right:15px;
    background:black;
    color:white;
    font-size:12px;
    padding:8px 12px;
}
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<button class="fullscreen" onclick="goFull()">FULL SCREEN</button>
<canvas id="confetti"></canvas>

<div class="box">

<div id="step1">
    <button class="main-btn" onclick="showQuestion()">Click Here</button>
</div>

<div id="step2" style="display:none;">
    <h2>Who is my baccha?</h2>
    <button class="option-btn" onclick="correct()">Budbudiyu</button>
    <button class="option-btn" onclick="wrong()">Me</button>
    <p id="result"></p>
</div>

</div>

<!-- Sounds (offline) -->
<audio id="win" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YRAAAAAA////AAAAAAAA////AAAAAAAA"></audio>
<audio id="fail" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQwAAAAAAP//AAD//wAA"></audio>

<script>
function showQuestion(){
    document.getElementById("step1").style.display="none";
    document.getElementById("step2").style.display="block";
}

function correct(){
    document.getElementById("win").play();
    document.getElementById("result").innerHTML=
        "<span class='correct'>Correct! Budbudiyu is the baccha 🎉</span>";
    startConfetti();
}

function wrong(){
    document.getElementById("fail").play();
    document.getElementById("result").innerHTML=
        "<span class='wrong'>Wrong! Try again 😂</span>";
}

function goFull(){
    document.documentElement.requestFullscreen();
}

/* Confetti */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

function startConfetti(){
    pieces=[];
    for(let i=0;i<150;i++){
        pieces.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height- canvas.height,
            size:6,
            speed:Math.random()*4+2,
            color:`hsl(${Math.random()*360},100%,50%)`
        });
    }
    animate();
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,p.size,p.size);
        p.y+=p.speed;
    });
    if(pieces.some(p=>p.y<canvas.height)){
        requestAnimationFrame(animate);
    }
}
</script>

</body>
</html>
