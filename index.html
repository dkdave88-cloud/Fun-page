<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Game</title>

<style>
:root{
    --accent:#ff7a18;
    --accent2:#ff3d81;
    --success:#1aa54b;
    --fail:#d62828;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,system-ui;
    background:radial-gradient(circle at top,#ffb347,#ff3d81);
    min-height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:380px;
    backdrop-filter: blur(14px);
    background:rgba(255,255,255,.92);
    border-radius:24px;
    padding:32px 26px;
    text-align:center;
    box-shadow:
      0 18px 40px rgba(0,0,0,.25),
      inset 0 1px 0 rgba(255,255,255,.6);
    animation:float .6s ease;
}

@keyframes float{
    from{opacity:0;transform:translateY(20px) scale(.96)}
    to{opacity:1;transform:none}
}

h2{
    margin:10px 0 22px;
    font-weight:700;
    letter-spacing:.3px;
}

button{
    width:100%;
    padding:16px;
    margin:12px 0;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .2s ease, background .2s;
}

button:active{
    transform:scale(.97);
}

.primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    box-shadow:0 8px 20px rgba(255,80,120,.45);
}

.option{
    background:#f2f4ff;
    color:#1e2a78;
}

.option:hover{
    background:#e3e7ff;
}

.option:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.result{
    margin-top:16px;
    font-size:17px;
    font-weight:600;
    min-height:24px;
    transition:color .2s ease;
}

.success{ color:var(--success); }
.fail{ color:var(--fail); }
</style>
</head>

<body>

<div class="card">

<div id="step1">
    <button class="primary" id="startBtn">Click Here</button>
</div>

<div id="step2" hidden>
    <h2>Who is my baccha?</h2>
    <button class="option" data-answer="correct">Budbudiyu</button>
    <button class="option" data-answer="wrong">Me</button>
    <div id="result" class="result" aria-live="polite"></div>
</div>

</div>

<script>
const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const startBtn = document.getElementById("startBtn");
const result = document.getElementById("result");
const options = document.querySelectorAll(".option");

startBtn.addEventListener("click", () => {
    step1.style.display = "none";
    step2.hidden = false;
});

options.forEach(btn => {
    btn.addEventListener("click", () => {
        const isCorrect = btn.dataset.answer === "correct";

        result.textContent = isCorrect
            ? "🎉 Correct! Budbudiyu is the baccha!"
            : "😄 Nope — try again!";

        result.className = "result " + (isCorrect ? "success" : "fail");

        // Disable buttons after selection
        options.forEach(b => b.disabled = true);
    });
});
</script>

</body>
</html>
